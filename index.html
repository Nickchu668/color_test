<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 強制禁止瀏覽器快取此 HTML 頁面 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>色感大測試 - 專業視覺功能評估系統</title>
    
    <style>
        :root { --clinical-blue: #2563eb; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; margin: 0; 
            background-color: #f0f7ff;
            background-image: url('https://images.unsplash.com/photo-1505751172107-573225ad7b71?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .medical-glass { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--clinical-blue), transparent); opacity: 0.15; top: 0; animation: scan 5s linear infinite; pointer-events: none; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hud-corner { position: absolute; width: 20px; height: 20px; border-color: #2563eb; opacity: 0.7; z-index: 5; }
        .hud-tl { top: -2px; left: -2px; border-top: 4px solid; border-left: 4px solid; }
        .hud-tr { top: -2px; right: -2px; border-top: 4px solid; border-right: 4px solid; }
        .hud-bl { bottom: -2px; left: -2px; border-bottom: 4px solid; border-left: 4px solid; }
        .hud-br { bottom: -2px; right: -2px; border-bottom: 4px solid; border-right: 4px solid; }
        .report-sheet { background: #ffffff; background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px); background-size: 24px 24px; }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          15% { transform: translateX(-12px); }
          30% { transform: translateX(12px); }
          45% { transform: translateX(-12px); }
          60% { transform: translateX(12px); }
          75% { transform: translateX(-8px); }
          85% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "framer-motion": "https://esm.sh/framer-motion@11.11.11?external=react,react-dom",
    "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <div class="scan-line"></div>
    
    <script type="module">
        // 核心修正：
        // 1. 統一 React 版本（解決 useMemo of null 報錯，這通常是多個 React 實例導致的）。
        // 2. 透過動態計算基礎路徑，確保支援子目錄部署。
        // 3. 僅使用 esm.sh/run 載入 index.tsx。
        const cacheBuster = Date.now();
        const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
        const entryUrl = window.location.origin + base + 'index.tsx?v=' + cacheBuster;
        
        console.log("正在啟動診斷系統...", entryUrl);
        
        // 載入主程式邏輯
        import(`https://esm.sh/run?main=${entryUrl}`);
    </script>
</body>
</html>
